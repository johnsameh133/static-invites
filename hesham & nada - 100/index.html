<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فرح هشام و ندى</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;700&family=Roboto:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Loading/Opening Screen -->
    <div id="opening-screen" class="screen active">
        <div class="card-container">
            <div class="card-wrapper">
                <img src="7.jpg" alt="اضغط للفتح" id="open-btn" class="cover-image">
                <div class="pulse-ring"></div>
            </div>
            <p class="instruction-text"></p>
        </div>
    </div>

    <!-- Main Content -->
    <!-- Main Content -->
    <main id="main-content" class="screen hidden">

        <!-- Images Section (Transparent - No White Background) -->
        <div class="content-container transparent" style="margin-bottom: 20px;">
            <div class="gallery">
                <div class="photo-frame fade-in delay-1">
                    <img src="6.png" alt="العريس والعروس">
                </div>

            </div>
        </div>

        <!-- Locations Section (White Box) -->
        <div class="content-container">

            <!-- Location 2 (Duplicate) -->
            <div class="details-section fade-in delay-3">
                <div class="location-box">
                    <p class="hotel-name">فندق The Guard - شارع الصاعفة - الماظة - القاهرة</p>
                    <div style="height: 20px; border-top: 1px dashed rgba(0,0,0,0.1); margin: 10px 0;"></div>


                    <a href="https://maps.app.goo.gl/YCFm8LZuTvwKaBE48"
                        target="_blank" class="map-btn">
                        <i class="fa-regular fa-map icon"></i>
                        افتح الموقع على الخريطة
                    </a>

                    <div style="padding-top: 20px;"></div>

                    <div class="calendar-dropdown">
                        <button class="calendar-btn" onclick="toggleCalendarDropdown()">
                            <i class="fa-regular fa-calendar icon"></i>
                            اضف الى التقويم
                        </button>
                        <div class="dropdown-menu" id="calendarDropdown">
                            <a href="#" target="_blank" class="calendar-option">
                                <i class="fa-brands fa-google"></i>

                                Google Calendar
                            </a>
                            <a href="#" target="_blank" class="calendar-option">
                                <i class="fa-brands fa-microsoft"></i>
                                Outlook
                            </a>
                            <a href="#" target="_blank" class="calendar-option">
                                <i class="fa-brands fa-yahoo"></i>
                                Yahoo Calendar
                            </a>
                            <!-- <a href="#" class="calendar-option disabled" onclick="return false;">
                                <span class="calendar-icon apple">🍎</span>
                                Apple Calendar
                            </a> -->
                        </div>
                    </div>

                    <div style="padding-top: 20px;"></div>

                    <div class="share-dropdown">
                        <button class="share-btn" onclick="toggleShareDropdown()">
                            <span class="share-btn-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                            </span>
                            شارك الدعوة
                        </button>
                        <div class="dropdown-menu" id="shareDropdown">
                            <a href="#" class="calendar-option" onclick="copyInviteLink(event)">
                                <span class="calendar-icon share-copy">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                                </span>
                                <span id="copyLinkText">نسخ الرابط</span>
                            </a>
                            <a href="#" class="calendar-option" id="whatsappShareBtn">
                                <span class="calendar-icon share-whatsapp">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
                                </span>
                                مشاركة عبر واتساب
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <footer class="fade-in delay-4">
                <p class="footer-msg">بكل الحب، ننتظركم لتشاركونا أجمل يوم في حياتنا 💖</p>
            </footer>
        </div>

    </main>

    <script src="script.js"></script>
</body>

</html>
